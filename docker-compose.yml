version: "3.9"

services:
  frontend:
    build: ./frontend
    container_name: stream_frontend
    ports:
      - "5173:5173"
    restart: always
    
  backend:
    build: ./backend
    container_name: stream_backend
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/uploads:/app/uploads
    restart: always

  worker:
    build: ./backend
    container_name: stream_worker
    command: node workers/videoWorker.js
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/uploads:/app/uploads
    restart: always
    depends_on:
      - backend

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: stream_nginx
    ports:
      - "80:80"
    volumes:
      - ./backend/uploads:/app/uploads
    depends_on:
      - backend
      - frontend
    restart: always