version: "3.9"

services:

  backend:
    build: ./backend
    container_name: stream_backend
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/uploads:/app/uploads
    restart: always

  worker:
    build: ./backend
    container_name: stream_worker
    command: node workers/videoWorker.js
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/uploads:/app/uploads
    restart: always
    depends_on:
      - backend

  frontend:
    build: ./frontend
    container_name: stream_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
    restart: always